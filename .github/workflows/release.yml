name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v0.3.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            slug: windows-x64
            ext: .exe
          - os: macos-latest
            slug: macos-arm64
            ext: ""
          - os: ubuntu-latest
            slug: linux-x64
            ext: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            Write-Error "Release tag must start with v"
            exit 1
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev libxtst-dev

      - name: Build portable binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $name = "paste_tool-${{ steps.release_tag.outputs.tag }}-${{ matrix.slug }}${{ matrix.ext }}"
          $ldflags = "-s -w -X github.com/Mai-xiyu/Paste-Tool/internal/metadata.Version=${{ steps.release_tag.outputs.version }}"
          if ("${{ runner.os }}" -eq "Windows") {
            $ldflags = "$ldflags -H windowsgui"
            go build -ldflags "$ldflags" -o "dist/$name" ./cmd/paste-tool-gui
          } else {
            go build -ldflags "$ldflags" -o "dist/$name" ./cmd/paste-tool
          }
          if ("${{ runner.os }}" -eq "Windows") {
            Copy-Item "dist/$name" "dist/paste_tool-latest-windows-x64.exe" -Force
          }

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PASTE_TOOL_VERSION: ${{ steps.release_tag.outputs.version }}
          PASTE_TOOL_SOURCE_EXE: ${{ github.workspace }}\dist\paste_tool-${{ steps.release_tag.outputs.tag }}-${{ matrix.slug }}${{ matrix.ext }}
          PASTE_TOOL_OUTPUT_DIR: ${{ github.workspace }}\dist
          PASTE_TOOL_INSTALLER_BASENAME: paste_tool-installer-${{ steps.release_tag.outputs.tag }}-${{ matrix.slug }}
        run: |
          iscc installer/PasteTool.iss
          Copy-Item "dist/paste_tool-installer-${{ steps.release_tag.outputs.tag }}-${{ matrix.slug }}.exe" "dist/paste_tool-installer-latest.exe" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-${{ steps.release_tag.outputs.tag }}-${{ matrix.slug }}
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/*
