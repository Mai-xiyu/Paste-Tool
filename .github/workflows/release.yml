name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app version
        id: app_version
        shell: pwsh
        run: |
          $version = ./scripts/read-app-version.ps1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate version matches tag
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.app_version.outputs.version }}"
          $actualTag = "${{ steps.release_tag.outputs.tag }}"
          if ($actualTag -ne $expectedTag) {
            Write-Error "Release tag $actualTag does not match APP_VERSION $expectedTag"
            exit 1
          }

      - name: Set up MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Build executable
        shell: msys2 {0}
        run: |
          mkdir -p dist
          gcc paste_tool.c platform_win32.c app_core.c -o dist/paste_tool.exe -mwindows -lshell32 -lurlmon -lwinhttp

      - name: Prepare portable artifact
        shell: pwsh
        run: |
          ./scripts/package-artifact.ps1 -VersionLabel "${{ steps.release_tag.outputs.tag }}"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          ./scripts/build-installer.ps1 -VersionLabel "${{ steps.release_tag.outputs.tag }}"

      - name: Create stable latest asset names
        shell: pwsh
        run: |
          Copy-Item -Path dist/paste_tool-${{ steps.release_tag.outputs.tag }}-windows-x64.exe -Destination dist/paste_tool-latest-windows-x64.exe -Force
          Copy-Item -Path dist/paste_tool-installer-${{ steps.release_tag.outputs.tag }}-windows-x64.exe -Destination dist/paste_tool-installer-latest.exe -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-${{ steps.release_tag.outputs.tag }}-windows-x64
          path: dist/paste_tool-${{ steps.release_tag.outputs.tag }}-windows-x64.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-installer-${{ steps.release_tag.outputs.tag }}-windows-x64
          path: dist/paste_tool-installer-${{ steps.release_tag.outputs.tag }}-windows-x64.exe
          if-no-files-found: error

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/paste_tool-${{ steps.release_tag.outputs.tag }}-windows-x64.exe
            dist/paste_tool-latest-windows-x64.exe
            dist/paste_tool-installer-${{ steps.release_tag.outputs.tag }}-windows-x64.exe
            dist/paste_tool-installer-latest.exe
