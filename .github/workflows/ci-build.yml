name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev libxtst-dev xvfb

      - name: Test
        if: runner.os != 'Linux'
        run: go test ./...

      - name: Test Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $ext = ""
          if ("${{ runner.os }}" -eq "Windows") { $ext = ".exe" }
          go build -o "dist/paste_tool$ext" ./cmd/paste-tool

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-${{ runner.os }}-${{ runner.arch }}-${{ github.run_number }}
          path: dist/
          if-no-files-found: error
