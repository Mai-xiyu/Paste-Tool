name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app version
        id: app_version
        shell: pwsh
        run: |
          $version = ./scripts/read-app-version.ps1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Build executable
        shell: msys2 {0}
        run: |
          mkdir -p dist
          gcc paste_tool.c platform_win32.c app_core.c -o dist/paste_tool.exe -mwindows -lshell32

      - name: Package build artifact
        shell: pwsh
        run: |
          ./scripts/package-artifact.ps1 -VersionLabel "v${{ steps.app_version.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-v${{ steps.app_version.outputs.version }}-windows-x64-${{ github.run_number }}
          path: dist/paste_tool-v${{ steps.app_version.outputs.version }}-windows-x64.zip
          if-no-files-found: error
