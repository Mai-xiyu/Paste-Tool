name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app version
        id: app_version
        shell: pwsh
        run: |
          $version = ./scripts/read-app-version.ps1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item build/src/Release/paste_tool.exe dist/ -ErrorAction SilentlyContinue
          Copy-Item build/src/paste_tool.exe dist/ -ErrorAction SilentlyContinue
          windeployqt --release --no-translations dist/paste_tool.exe

      - name: Prepare portable artifact
        shell: pwsh
        run: |
          ./scripts/package-artifact.ps1 -VersionLabel "v${{ steps.app_version.outputs.version }}"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build-installer.ps1 -VersionLabel "v${{ steps.app_version.outputs.version }}"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-v${{ steps.app_version.outputs.version }}-${{ runner.os }}-x64-${{ github.run_number }}
          path: dist/
          if-no-files-found: error

      - name: Upload installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: paste_tool-installer-v${{ steps.app_version.outputs.version }}-windows-x64-${{ github.run_number }}
          path: dist/paste_tool-installer-v${{ steps.app_version.outputs.version }}-windows-x64.exe
          if-no-files-found: error
